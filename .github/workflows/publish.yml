name: publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run test --workspace @tryformation/querylight-ts
      - run: npm run build --workspace @tryformation/querylight-ts
      - run: npm publish --workspace @tryformation/querylight-ts --provenance
