name: publish

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: querylight-ts-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run library tests
        run: npm run test --workspace @tryformation/querylight-ts

      - name: Build library package
        run: npm run build --workspace @tryformation/querylight-ts

      - name: Publish package
        run: npm publish --workspace @tryformation/querylight-ts --provenance
